services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: aicore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aicore
      POSTGRES_PASSWORD: aicore
      POSTGRES_DB: aicore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicore -d aicore"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aicore-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  aicore-api:
    build:
      context: ./AICore
      dockerfile: docker/Dockerfile.api
    container_name: aicore-api
    ports:
      - "8000:8000"
    env_file:
      - ./AICore/.env
    environment:
      ENV: dev
    volumes:
      - ./AICore/app:/app/app
    depends_on:
      - qdrant
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aicore-frontend
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: aicore-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - aicore-api
      - frontend
    restart: unless-stopped

  aicore-embedding:
    build:
      context: ./EmbeddingService
      dockerfile: Dockerfile.cpu
      target: runtime
    container_name: aicore-embedding
    ports:
      - "50051:50051"
    volumes:
      - ./EmbeddingService/app:/app/app
      - ./EmbeddingService/core:/app/core
      - ./EmbeddingService/grpc_generated:/app/grpc_generated
      - ./ai_models/bge-m3:/app/models/bge-m3:ro
    environment:
      BGE_M3_MODEL_PATH: /app/models/bge-m3
      USE_CPU: "true"
      USE_FP16: "false"
      CUDA_VISIBLE_DEVICES: ""
      ENV: dev
    env_file:
      - ./EmbeddingService/.env
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:

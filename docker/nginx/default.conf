server {
    listen 80;
    server_name tasco.csvdemo.com;

    # ACME challenge for Let's Encrypt cert issuance and renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS once cert is in place
    location / {
        return 301 https://$host$request_uri;
    }
}

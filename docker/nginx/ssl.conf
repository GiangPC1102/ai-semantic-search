server {
    listen 443 ssl;
    server_name tasco.csvdemo.com;

    ssl_certificate     /etc/letsencrypt/live/tasco.csvdemo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasco.csvdemo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Forward /api/* to AICore (trailing slash strips the /api prefix)
    location /api/ {
        proxy_pass http://aicore-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Forward everything else to Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
